name: boatlab 운영 배포

on:
  workflow_dispatch:
    inputs:
      version:
        description: "배포할 Boatlab 릴리스 버전 (예: 1.0.1)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: boatlab-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    name: 운영 배포
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: 배포 실행
        id: deploy
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
          PRODUCTION_RUNTIME_ENV: ${{ secrets.PRODUCTION_RUNTIME_ENV }}
          PRODUCTION_FIREBASE_JSON: ${{ secrets.PRODUCTION_FIREBASE_JSON }}
          PRODUCTION_LETSENCRYPT_EMAIL: ${{ vars.PRODUCTION_LETSENCRYPT_EMAIL }}
        run: deploy/prod/scripts/github-deploy.sh

      - name: 배포 결과 요약
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.deploy.outputs.release_version }}
          GIT_TAG: ${{ steps.deploy.outputs.git_tag }}
          GIT_REVISION: ${{ steps.deploy.outputs.git_revision }}
          IMAGE_TAG: ${{ steps.deploy.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.deploy.outputs.image_digest }}
          ACTIVE_SLOT: ${{ steps.deploy.outputs.active_slot }}
        run: |
          {
            printf '## Boatlab 운영 배포\n\n'
            printf '| 항목 | 값 |\n|---|---|\n'
            printf "| 버전 | \`%s\` |\n" "$RELEASE_VERSION"
            printf "| Git tag | \`%s\` |\n" "$GIT_TAG"
            printf "| Git revision | \`%s\` |\n" "$GIT_REVISION"
            printf "| 이미지 태그 | \`%s\` |\n" "$IMAGE_TAG"
            printf "| 이미지 digest | \`%s\` |\n" "$IMAGE_DIGEST"
            printf "| 활성 슬롯 | \`%s\` |\n" "$ACTIVE_SLOT"
          } >> "$GITHUB_STEP_SUMMARY"
