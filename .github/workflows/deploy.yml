name: boatlab 운영 배포

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 boat-backend immutable 이미지 태그 (예: sha-abc1234)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: boatlab-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 운영 배포
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5

      - name: 배포 실행
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
          PRODUCTION_RUNTIME_ENV: ${{ secrets.PRODUCTION_RUNTIME_ENV }}
          PRODUCTION_FIREBASE_JSON: ${{ secrets.PRODUCTION_FIREBASE_JSON }}
          PRODUCTION_GHCR_USERNAME: ${{ secrets.PRODUCTION_GHCR_USERNAME }}
          PRODUCTION_GHCR_TOKEN: ${{ secrets.PRODUCTION_GHCR_TOKEN }}
          PRODUCTION_LETSENCRYPT_EMAIL: ${{ vars.PRODUCTION_LETSENCRYPT_EMAIL }}
        run: deploy/prod/scripts/github-deploy.sh
