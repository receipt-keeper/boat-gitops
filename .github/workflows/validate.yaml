name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: 개발 Helm chart 검사
        shell: bash
        run: |
          set -Eeuo pipefail
          helm lint charts/boatlab -f charts/boatlab/values-dev.yaml
          helm template boatlab charts/boatlab -f charts/boatlab/values-dev.yaml > /tmp/boatlab-dev.yaml
          test -s /tmp/boatlab-dev.yaml
          grep -q "kind: Deployment" /tmp/boatlab-dev.yaml
          grep -q "kind: StatefulSet" /tmp/boatlab-dev.yaml
          grep -q "kind: Job" /tmp/boatlab-dev.yaml
          grep -q 'schedule: "\*/5 \* \* \* \*"' /tmp/boatlab-dev.yaml
          grep -q "concurrencyPolicy: Forbid" /tmp/boatlab-dev.yaml
          grep -q "restartPolicy: Never" /tmp/boatlab-dev.yaml
          grep -q "app.modules.notifications.jobs.schedule_push_notifications" /tmp/boatlab-dev.yaml
          grep -q "kind: Application" argocd/applications/boatlab-dev.yaml

      - name: 운영 스크립트와 계약 검사
        shell: bash
        run: |
          set -Eeuo pipefail
          for script in deploy/prod/scripts/*.sh deploy/prod/tests/*.sh; do
            bash -n "$script"
          done
          bash deploy/prod/tests/deploy-state-machine.sh
          grep -Eq '^sha-[0-9a-f]{7,64}$' deploy/prod/config/image-tag
          grep -Eq '^sha256:[0-9a-f]{64}$' deploy/prod/config/image-digest
          grep -Fq -- "api.boatlab.co.kr" deploy/prod/nginx/default.conf.template
          grep -Fq -- "OnCalendar=*:0/5" deploy/prod/systemd/boatlab-scheduler.timer
          grep -Fq -- "flock --nonblock" deploy/prod/systemd/boatlab-scheduler.service
          grep -Fq -- "--conflict-exit-code 0" deploy/prod/systemd/boatlab-scheduler.service
          grep -Fq -- "app.modules.notifications.jobs.schedule_push_notifications" deploy/prod/compose.yaml
          grep -Fq -- "--dry-run=false" deploy/prod/compose.yaml
          grep -Fq -- "install -m 0644 \"\$STAGING_ROOT/boatlab-firebase.json\"" deploy/prod/scripts/install-release.sh
          grep -Fq -- "certbot/certbot:v5.7.0@sha256:" deploy/prod/compose.yaml
          grep -Fq -- "--no-random-sleep-on-renew" deploy/prod/scripts/renew-certificate.sh
          grep -Fq -- "run: deploy/prod/scripts/github-deploy.sh" .github/workflows/deploy.yml
          grep -Fq -- "name: boatlab 운영 배포" .github/workflows/deploy.yml
          grep -Fq -- "if: github.ref == 'refs/heads/main'" .github/workflows/deploy.yml
          if grep -R -n -- "uv run" deploy/prod \
            .github/workflows/deploy.yml; then
            echo "운영 runtime 경로에 uv run이 남아 있습니다." >&2
            exit 1
          fi
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:v0.10.0 \
            --severity=warning \
            deploy/prod/scripts/*.sh deploy/prod/tests/*.sh

      - name: Compose와 Nginx 검사
        shell: bash
        run: |
          set -Eeuo pipefail
          temp_dir="$(mktemp -d)"
          nginx_container=''
          cleanup() {
            if [[ -n "$nginx_container" ]]; then
              docker rm -f "$nginx_container" >/dev/null 2>&1 || true
            fi
            rm -rf "$temp_dir"
          }
          trap cleanup EXIT
          mkdir -p "$temp_dir/letsencrypt/live/api.boatlab.co.kr" "$temp_dir/webroot" "$temp_dir/nginx"

          cat > "$temp_dir/runtime.env" <<'ENV'
          APP_ENV=prod
          DB_HOST=db.example
          DB_PORT=5432
          DB_NAME=boatlab
          DB_USER=user
          DB_PASSWORD=p@ss$NAME
          JWT_SECRET_KEY=dummy
          JWT_ALGORITHM=HS256
          JWT_ISSUER=boat-backend
          JWT_AUDIENCE=boat-api
          ACCESS_TOKEN_EXPIRES_MINUTES=60
          REFRESH_TOKEN_EXPIRES_DAYS=30
          REFRESH_TOKEN_PEPPER=dummy
          PROMOTION_BENEFICIARY_HMAC_SECRET=dummy
          OPENROUTER_API_KEY=dummy
          OPENROUTER_MODEL=openai/gpt-4.1-mini
          FILE_STORAGE_BACKEND=s3
          S3_BUCKET=boatlab-test
          S3_REGION=ap-northeast-2
          S3_ENDPOINT_URL=
          FIREBASE_PROJECT_ID=boatlab-test
          FIREBASE_CHECK_REVOKED=true
          PUSH_SEND_ENABLED=true
          PUSH_TOKEN_STALE_DAYS=60
          OUTBOX_POLLER_ENABLED=true
          ENV
          printf '%s\n' \
            '{"type":"service_account","project_id":"boatlab-test","private_key":"dummy","client_email":"server@example.com"}' \
            > "$temp_dir/firebase.json"

          RUNNER_TEMP="$temp_dir" \
          IMAGE_TAG="$(< deploy/prod/config/image-tag)" \
          PRODUCTION_HOST=prod.example.com \
          PRODUCTION_USER=ubuntu \
          PRODUCTION_SSH_PRIVATE_KEY=dummy \
          PRODUCTION_KNOWN_HOSTS=dummy \
          PRODUCTION_RUNTIME_ENV="$(< "$temp_dir/runtime.env")" \
          PRODUCTION_FIREBASE_JSON="$(< "$temp_dir/firebase.json")" \
          PRODUCTION_LETSENCRYPT_EMAIL=ops@example.com \
            deploy/prod/scripts/github-deploy.sh --validate-only
          sed 's/__BACKEND_SLOT__/backend-blue/g' \
            deploy/prod/nginx/default.conf.template > "$temp_dir/nginx/default.conf"

          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj '/CN=api.boatlab.co.kr' \
            -keyout "$temp_dir/letsencrypt/live/api.boatlab.co.kr/privkey.pem" \
            -out "$temp_dir/letsencrypt/live/api.boatlab.co.kr/fullchain.pem" >/dev/null 2>&1

          IMAGE_TAG=sha-0000000 \
          IMAGE_DIGEST="$(< deploy/prod/config/image-digest)" \
          RUNTIME_ENV_FILE="$temp_dir/runtime.env" \
          FIREBASE_CREDENTIALS_FILE="$temp_dir/firebase.json" \
          NGINX_CONFIG_ROOT="$temp_dir/nginx" \
          LETSENCRYPT_ROOT="$temp_dir/letsencrypt" \
          CERTBOT_WEBROOT="$temp_dir/webroot" \
          docker compose -f deploy/prod/compose.yaml config --format json \
            > "$temp_dir/compose.json"

          python - "$temp_dir/compose.json" "$(< deploy/prod/config/image-digest)" <<'PY'
          import json
          import sys

          compose_path, expected_digest = sys.argv[1:]
          with open(compose_path, encoding="utf-8") as compose_file:
              compose = json.load(compose_file)
          services = compose["services"]
          expected_image = f"ghcr.io/receipt-keeper/boat-backend@{expected_digest}"
          for name in ("backend-blue", "backend-green", "migrate", "scheduler"):
              assert services[name]["image"] == expected_image
              assert services[name]["environment"]["DB_PASSWORD"] == "p@ss$$NAME"
          assert services["scheduler"]["command"] == [
              "python",
              "-m",
              "app.modules.notifications.jobs.schedule_push_notifications",
              "--dry-run=false",
          ]
          assert "secrets" in services["backend-blue"]
          assert "secrets" in services["backend-green"]
          assert "secrets" not in services["migrate"]
          assert "secrets" not in services["scheduler"]
          assert services["nginx"]["image"].startswith("nginx:1.30.3-alpine@sha256:")
          assert services["certbot"]["image"].startswith("certbot/certbot:v5.7.0@sha256:")
          PY

          docker run --rm \
            -v "$PWD/deploy/prod/nginx/bootstrap.conf.template:/etc/nginx/conf.d/default.conf:ro" \
            -v "$temp_dir/webroot:/var/www/certbot:ro" \
            nginx:1.30.3-alpine@sha256:0d3b80406a13a767339fbe2f41406d6c7da727ab89cf8fae399e81f780f814d1 nginx -t

          docker run --rm \
            --add-host=backend-blue:127.0.0.1 \
            -v "$temp_dir/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$temp_dir/letsencrypt:/etc/letsencrypt:ro" \
            -v "$temp_dir/webroot:/var/www/certbot:ro" \
            nginx:1.30.3-alpine@sha256:0d3b80406a13a767339fbe2f41406d6c7da727ab89cf8fae399e81f780f814d1 nginx -t

          mv "$temp_dir/nginx/default.conf" "$temp_dir/nginx/default.next"
          cp deploy/prod/nginx/bootstrap.conf.template "$temp_dir/nginx/default.conf"
          nginx_container="$(docker run -d \
            --add-host=backend-blue:127.0.0.1 \
            -v "$temp_dir/nginx:/etc/nginx/conf.d:ro" \
            -v "$temp_dir/letsencrypt:/etc/letsencrypt:ro" \
            -v "$temp_dir/webroot:/var/www/certbot:ro" \
            nginx:1.30.3-alpine@sha256:0d3b80406a13a767339fbe2f41406d6c7da727ab89cf8fae399e81f780f814d1)"
          mv "$temp_dir/nginx/default.next" "$temp_dir/nginx/default.conf"
          docker exec "$nginx_container" grep -q 'server backend-blue:8000;' \
            /etc/nginx/conf.d/default.conf
          docker exec "$nginx_container" nginx -t
          docker exec "$nginx_container" nginx -s reload
          docker rm -f "$nginx_container" >/dev/null
          nginx_container=''

          docker run --rm \
            certbot/certbot:v5.7.0@sha256:6bb19cff0b3972a69855686e0ccbd20b98dbfae2aa43845a5df48947ba1401b4 \
            --version

      - name: GitHub Actions 문법 검사
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7
