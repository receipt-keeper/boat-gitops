apiVersion: v1
kind: Service
metadata:
  name: {{ include "boat-backend.backendName" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ include "boat-backend.backendName" . }}
    {{- include "boat-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "boat-backend.backendName" . }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
