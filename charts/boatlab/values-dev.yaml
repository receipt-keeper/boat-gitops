environment: dev

namespace:
  name: boatlab-dev

image:
  tag: sha-14d0ee5

backend:
  replicas: 1

postgresql:
  external:
    enabled: true
    nodePort: 30432
    annotations:
      external-dns.alpha.kubernetes.io/hostname: db.luigi99.cloud
  persistence:
    size: 5Gi

ingress:
  hosts:
    - host: boatlab-dev.luigi99.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: boatlab-dev-tls
      hosts:
        - boatlab-dev.luigi99.cloud
