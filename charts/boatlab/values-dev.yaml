environment: dev

namespace:
  name: boatlab-dev

image:
  tag: sha-bd738db

backend:
  replicas: 1

pushNotificationScheduler:
  enabled: true

postgresql:
  external:
    enabled: true
    nodePort: 30432
    annotations:
      external-dns.alpha.kubernetes.io/hostname: db.luigi99.cloud
  persistence:
    size: 5Gi

ingress:
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 60m
  hosts:
    - host: boatlab-dev.luigi99.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: boatlab-dev-tls
      hosts:
        - boatlab-dev.luigi99.cloud
