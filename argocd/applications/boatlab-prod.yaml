apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boatlab-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: boatlab-backend
    app.kubernetes.io/part-of: boatlab
    app.kubernetes.io/environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/receipt-keeper/boat-gitops.git
    targetRevision: main
    path: charts/boatlab
    helm:
      releaseName: boatlab
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: boatlab-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
