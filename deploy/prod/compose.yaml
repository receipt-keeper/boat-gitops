name: boatlab-prod

x-runtime: &runtime
  image: "${BACKEND_IMAGE_REPOSITORY:-ghcr.io/receipt-keeper/boat-backend}@${IMAGE_DIGEST:?IMAGE_DIGEST is required}"
  env_file:
    - "${RUNTIME_ENV_FILE:-./runtime.env}"
  networks:
    - boatlab

x-backend: &backend
  <<: *runtime
  environment:
    FIREBASE_CREDENTIALS_PATH: /run/secrets/boatlab-firebase.json
  secrets:
    - source: boatlab-firebase
      target: boatlab-firebase.json

services:
  backend-blue:
    <<: *backend
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend-green:
    <<: *backend
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  migrate:
    <<: *runtime
    restart: "no"
    healthcheck:
      disable: true
    command:
      - alembic
      - upgrade
      - head

  scheduler:
    <<: *runtime
    restart: "no"
    healthcheck:
      disable: true
    command:
      - python
      - -m
      - app.modules.notifications.jobs.schedule_push_notifications
      - --dry-run=false

  nginx:
    image: nginx:1.30.3-alpine@sha256:0d3b80406a13a767339fbe2f41406d6c7da727ab89cf8fae399e81f780f814d1
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - "${NGINX_CONFIG_ROOT:-./nginx}:/etc/nginx/conf.d:ro"
      - "${LETSENCRYPT_ROOT:-/etc/letsencrypt}:/etc/letsencrypt:ro"
      - "${CERTBOT_WEBROOT:-/var/www/boatlab-certbot}:/var/www/certbot:ro"
    networks:
      - boatlab

  certbot:
    image: certbot/certbot:v5.7.0@sha256:6bb19cff0b3972a69855686e0ccbd20b98dbfae2aa43845a5df48947ba1401b4
    restart: "no"
    volumes:
      - "${LETSENCRYPT_ROOT:-/etc/letsencrypt}:/etc/letsencrypt"
      - "${CERTBOT_WEBROOT:-/var/www/boatlab-certbot}:/var/www/certbot"

networks:
  boatlab:
    name: boatlab-prod

secrets:
  boatlab-firebase:
    file: "${FIREBASE_CREDENTIALS_FILE:-./firebase/service-account.json}"
